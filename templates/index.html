<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick-Off Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('/static/website.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">
    
    <!-- AUDIO ALARM ELEMENT -->
    <audio id="alarm-audio" src="/static/alarm.mp3" loop preload="auto"></audio>

    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-container" class="flex items-center justify-center min-h-screen bg-black/70 backdrop-blur-sm fixed inset-0 z-50">
        <div class="bg-gray-800/90 p-8 rounded-2xl shadow-2xl border border-purple-500/30 w-full max-w-md text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-400 mb-2">TICK-OFF MATRIX</h1>
            <p class="text-gray-400 text-sm mb-6">Verify tracking authentication protocol</p>
            
            <div class="space-y-4 mb-6 text-left">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Username</label>
                    <input type="text" id="auth-username" class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Password</label>
                    <input type="password" id="auth-password" class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 text-white">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleAuth('login')" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 py-3 rounded-xl font-bold transition shadow-lg">Login</button>
                <button onclick="handleAuth('register')" class="w-full bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-bold transition">Register</button>
            </div>
            <p id="auth-error" class="text-red-400 text-sm mt-4 font-medium hidden"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD PANEL -->
    <div id="dashboard-container" class="hidden min-h-screen bg-black/50 backdrop-blur-xs flex flex-col">
        <!-- TOP NAVIGATION HEADER -->
        <header class="bg-gray-900/80 border-b border-gray-800 px-6 py-4 flex justify-between items-center backdrop-blur-md">
            <div class="flex items-center space-x-3">
                <div class="h-3 w-3 bg-green-400 rounded-full animate-pulse"></div>
                <h1 class="text-xl font-bold uppercase tracking-wider text-purple-400">Tick-Off Matrix Portal</h1>
            </div>
            <div class="flex items-center space-x-6">
                <span id="user-display" class="text-gray-300 font-medium text-sm"></span>
                <button onclick="logout()" class="text-xs font-semibold text-red-400 hover:text-red-300 uppercase tracking-wider transition bg-red-950/40 px-3 py-1.5 rounded-lg border border-red-900/50">Disconnect</button>
            </div>
        </header>

        <main class="flex-1 p-6 grid grid-cols-1 lg:grid-cols-4 gap-6 max-w-[1600px] mx-auto w-full">
            <!-- INPUT PANEL CONTROL -->
            <section class="bg-gray-900/80 p-6 rounded-2xl border border-gray-800 flex flex-col justify-between h-fit space-y-6">
                <div>
                    <h2 class="text-lg font-bold mb-4 border-b border-gray-800 pb-2 text-purple-300">Deploy New Task Node</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase text-gray-400 mb-1 font-semibold">Task Objective Name</label>
                            <input type="text" id="task-title" placeholder="e.g., Physics Assignment" class="w-full px-3 py-2 bg-gray-950 border border-gray-800 rounded-xl focus:outline-none focus:border-purple-500 text-sm text-white">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs uppercase text-gray-400 mb-1 font-semibold">Start (e.g., 15:30)</label>
                                <input type="text" id="task-start" placeholder="11:30 PM" class="w-full px-3 py-2 bg-gray-950 border border-gray-800 rounded-xl focus:outline-none focus:border-purple-500 text-sm text-white">
                            </div>
                            <div>
                                <label class="block text-xs uppercase text-gray-400 mb-1 font-semibold">End (e.g., 16:30)</label>
                                <input type="text" id="task-end" placeholder="11:45 PM" class="w-full px-3 py-2 bg-gray-950 border border-gray-800 rounded-xl focus:outline-none focus:border-purple-500 text-sm text-white">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs uppercase text-gray-400 mb-1 font-semibold">Priority</label>
                                <select id="task-priority" class="w-full px-3 py-2 bg-gray-950 border border-gray-800 rounded-xl focus:outline-none focus:border-purple-500 text-sm text-white">
                                    <option>High</option>
                                    <option selected>Medium</option>
                                    <option>Low</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs uppercase text-gray-400 mb-1 font-semibold">Category</label>
                                <select id="task-category" class="w-full px-3 py-2 bg-gray-950 border border-gray-800 rounded-xl focus:outline-none focus:border-purple-500 text-sm text-white">
                                    <option>School</option>
                                    <option>Academy</option>
                                    <option>Self-Study</option>
                                    <option>Break</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="addTask()" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl font-bold tracking-wide transition shadow-lg shadow-purple-900/20 text-sm">Inject Into Matrix</button>
            </section>

            <!-- MATRIX GRID QUADRANTS -->
            <section class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-red-950/20 p-4 rounded-2xl border border-red-500/20 flex flex-col min-h-[240px]">
                    <h3 class="text-sm font-bold text-red-400 uppercase tracking-widest mb-3 flex items-center justify-between">
                        <span>🔥 Urgent & Important</span><span class="text-xs text-red-500/50">Q1</span>
                    </h3>
                    <div id="quad-q1" class="space-y-2 flex-1 overflow-y-auto"></div>
                </div>
                <div class="bg-blue-950/20 p-4 rounded-2xl border border-blue-500/20 flex flex-col min-h-[240px]">
                    <h3 class="text-sm font-bold text-blue-400 uppercase tracking-widest mb-3 flex items-center justify-between">
                        <span>⚡ Important Not Urgent</span><span class="text-xs text-blue-500/50">Q2</span>
                    </h3>
                    <div id="quad-q2" class="space-y-2 flex-1 overflow-y-auto"></div>
                </div>
                <div class="bg-yellow-950/20 p-4 rounded-2xl border border-yellow-500/20 flex flex-col min-h-[240px]">
                    <h3 class="text-sm font-bold text-yellow-400 uppercase tracking-widest mb-3 flex items-center justify-between">
                        <span>💡 Urgent Not Important</span><span class="text-xs text-yellow-500/50">Q3</span>
                    </h3>
                    <div id="quad-q3" class="space-y-2 flex-1 overflow-y-auto"></div>
                </div>
                <div class="bg-gray-800/20 p-4 rounded-2xl border border-gray-700/30 flex flex-col min-h-[240px]">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center justify-between">
                        <span>💤 Neither</span><span class="text-xs text-gray-600">Q4</span>
                    </h3>
                    <div id="quad-q4" class="space-y-2 flex-1 overflow-y-auto"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- GLOBAL ALARM POPUP OVERLAY MODAL -->
    <div id="alarm-modal" class="hidden flex items-center justify-center bg-black/90 fixed inset-0 z-50 p-4 backdrop-blur-md">
        <div class="bg-gradient-to-b from-gray-900 to-black p-8 rounded-3xl border border-red-500 max-w-md w-full text-center shadow-2xl shadow-red-500/20 animate-bounce-short">
            <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/30 animate-pulse">
                <span class="text-4xl">⏰</span>
            </div>
            <h2 id="modal-alert-title" class="text-2xl font-black text-red-400 uppercase tracking-wide mb-1">Matrix Alert Sequence</h2>
            <p id="modal-task-name" class="text-xl font-bold text-white mb-2">Task Objective Alpha</p>
            <p id="modal-alert-type" class="text-sm text-gray-400 font-mono mb-6 uppercase tracking-widest bg-gray-950 py-1 px-3 rounded-lg w-fit mx-auto border border-gray-800">START ALERT ACTIVE</p>
            
            <div id="modal-actions-box" class="space-y-3">
                <!-- Dynamic Buttons Injected Here -->
            </div>
        </div>
    </div>

    <!-- CORE INTERACTION ARCHITECTURE -->
    <script>
        let currentActiveTasks = [];
        let activeAlarmTaskId = null;
        let activeAlarmType = null;

        document.addEventListener('click', () => {
            const audio = document.getElementById('alarm-audio');
            if (audio && audio.paused && !activeAlarmTaskId) {
                audio.play().then(() => audio.pause()).catch(() => {});
            }
        }, { once: true });

        async function checkStatus() {
            try {
                let res = await fetch('/api/auth/status');
                let data = await res.json();
                if (data.logged_in) {
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('dashboard-container').classList.remove('hidden');
                    document.getElementById('user-display').innerText = `Agent: ${data.username.toUpperCase()}`;
                    syncTasksLoop();
                } else {
                    document.getElementById('auth-container').classList.remove('hidden');
                    document.getElementById('dashboard-container').classList.add('hidden');
                    currentActiveTasks = [];
                }
            } catch(e) {}
        }

        async function handleAuth(mode) {
            let user = document.getElementById('auth-username').value;
            let pass = document.getElementById('auth-password').value;
            let err = document.getElementById('auth-error');
            err.classList.add('hidden');

            let res = await fetch(`/api/auth/${mode}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            let data = await res.json();
            if (data.success) {
                checkStatus();
            } else {
                err.innerText = data.message || "Authentication rejected.";
                err.classList.remove('hidden');
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', {method: 'POST'});
            checkStatus();
        }

        function formatTime12h(dateObj) {
            let hours = dateObj.getHours();
            let minutes = dateObj.getMinutes();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            return `${hours}:${minutes} ${ampm}`;
        }

        function cleanInputTime(str) {
            if (!str) return "";
            let cleaned = str.trim().toUpperCase();
            if (/^\d{1,2}:\d{2}$/.test(cleaned)) {
                let [h, m] = cleaned.split(':');
                h = parseInt(h);
                let ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12;
                h = h ? h : 12;
                return `${h}:${m < 10 ? '0'+parseInt(m) : m} ${ampm}`;
            }
            return cleaned;
        }

        async function addTask() {
            let title = document.getElementById('task-title').value;
            let startTime = cleanInputTime(document.getElementById('task-start').value);
            let endTime = cleanInputTime(document.getElementById('task-end').value);
            let priority = document.getElementById('task-priority').value;
            let category = document.getElementById('task-category').value;

            if(!title || !startTime || !endTime) return;

            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, startTime, endTime, priority, category})
            });

            document.getElementById('task-title').value = '';
            document.getElementById('task-start').value = '';
            document.getElementById('task-end').value = '';
            syncTasksLoop();
        }

        async function syncTasksLoop() {
            if (document.getElementById('dashboard-container').classList.contains('hidden')) return;
            try {
                let res = await fetch('/api/api/tasks'); // Fixed path matching blueprint
                if (res.status === 401) return;
                let data = await res.json();
                currentActiveTasks = data;
                renderMatrix();
                runFrontendAlarmEvaluator();
            } catch(e) {}
        }

        // --- FRONTEND REAL-TIME TIME CONTEXT EVALUATOR ---
        function runFrontendAlarmEvaluator() {
            if (activeAlarmTaskId) return; // Don't interrupt an existing active alarm

            let nowStr = formatTime12h(new Date());

            for (let task of currentActiveTasks) {
                if (task.completed) continue;

                // 1. Evaluate Start Alarm Trigger
                if (task.startTime === nowStr && !task.startRung) {
                    triggerFrontendAlarmSound(task, 'start');
                    break;
                }

                // 2. Evaluate Finish Alarm Trigger
                if (task.endTime === nowStr && !task.endRung) {
                    triggerFrontendAlarmSound(task, 'end');
                    break;
                }
            }
        }

        function triggerFrontendAlarmSound(task, type) {
            activeAlarmTaskId = task.id;
            activeAlarmType = type;

            document.getElementById('modal-task-name').innerText = task.title;
            document.getElementById('modal-alert-type').innerText = `${type.toUpperCase()} BOUNDARY REACHED`;
            
            let actionsBox = document.getElementById('modal-actions-box');
            actionsBox.innerHTML = '';

            if (type === 'start') {
                actionsBox.innerHTML = `
                    <button onclick="dismissAlarmAction('complete')" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold tracking-wide transition shadow-lg text-sm uppercase">Acknowledge & Start</button>
                `;
            } else {
                actionsBox.innerHTML = `
                    <button onclick="dismissAlarmAction('complete')" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold tracking-wide transition shadow-lg text-sm uppercase">Mark Finished</button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="extendTaskPrompt()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2.5 rounded-xl font-bold text-xs uppercase tracking-wide transition">Extend 5m</button>
                        <button onclick="dismissAlarmAction('clear')" class="w-full bg-gray-800 hover:bg-gray-700 py-2.5 rounded-xl font-bold text-xs uppercase tracking-wide transition">Snooze</button>
                    </div>
                `;
            }

            document.getElementById('alarm-modal').classList.remove('hidden');
            let audio = document.getElementById('alarm-audio');
            if(audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio activation error:", e));
            }
        }

        async function dismissAlarmAction(actionType) {
            let audio = document.getElementById('alarm-audio');
            if(audio) audio.pause();

            let taskId = activeAlarmTaskId;
            let alarmType = activeAlarmType;

            // Immediately clear local block tracking to turn off alarm layout
            activeAlarmTaskId = null;
            activeAlarmType = null;
            document.getElementById('alarm-modal').classList.add('hidden');

            if (actionType === 'complete') {
                await fetch(`/api/tasks/${taskId}/action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'complete'})
                });
            } else {
                let actionName = alarmType === 'start' ? 'mark_start_rung' : 'mark_end_rung';
                await fetch(`/api/tasks/${taskId}/action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: actionName})
                });
            }
            syncTasksLoop();
        }

        async function extendTaskPrompt() {
            let audio = document.getElementById('alarm-audio');
            if(audio) audio.pause();

            let taskId = activeAlarmTaskId;
            activeAlarmTaskId = null;
            activeAlarmType = null;
            document.getElementById('alarm-modal').classList.add('hidden');

            let extTime = prompt("Enter new target end time (e.g. 11:55 PM):");
            if (!extTime) return;
            let formattedExt = cleanInputTime(extTime);

            await fetch(`/api/tasks/${taskId}/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'extend', newTime: formattedExt})
            });
            syncTasksLoop();
        }

        function getQuadrant(priority, category) {
            if (priority === 'High' && (category === 'School' || category === 'Academy')) return 'q1';
            if (priority === 'Medium' && (category === 'School' || category === 'Academy' || category === 'Self-Study')) return 'q2';
            if (priority === 'High' && (category === 'Break' || category === 'Self-Study')) return 'q3';
            return 'q4';
        }

        function renderMatrix() {
            document.getElementById('quad-q1').innerHTML = '';
            document.getElementById('quad-q2').innerHTML = '';
            document.getElementById('quad-q3').innerHTML = '';
            document.getElementById('quad-q4').innerHTML = '';

            currentActiveTasks.forEach(task => {
                let q = getQuadrant(task.priority, task.category);
                let targetQuad = document.getElementById(`quad-${q}`);
                if (!targetQuad) return;

                let wrapper = document.createElement('div');
                wrapper.className = `p-3 rounded-xl bg-gray-900/90 border ${task.completed ? 'border-gray-800 opacity-50' : 'border-gray-800'} flex justify-between items-center text-sm`;
                
                wrapper.innerHTML = `
                    <div>
                        <p class="${task.completed ? 'line-through text-gray-500' : 'font-bold text-white'}">${task.title}</p>
                        <p class="text-xs text-gray-400 font-mono mt-0.5">⏱️ ${task.startTime} - ${task.endTime}</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        ${!task.completed ? `<button onclick="directComplete(${task.id})" class="text-xs font-bold text-green-400 bg-green-950/40 border border-green-900/60 px-2 py-1 rounded-lg hover:bg-green-900/50">✓</button>` : ''}
                        <button onclick="deleteTaskNode(${task.id})" class="text-xs font-bold text-red-400 bg-red-950/40 border border-red-900/60 px-2 py-1 rounded-lg hover:bg-red-900/50">🗙</button>
                    </div>
                `;
                targetQuad.appendChild(wrapper);
            });
        }

        async function directComplete(id) {
            await fetch(`/api/tasks/${id}/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'complete'})
            });
            syncTasksLoop();
        }

        async function deleteTaskNode(id) {
            await fetch(`/api/tasks/${id}`, {method: 'DELETE'});
            syncTasksLoop();
        }

        // Startup Verification Check
        checkStatus();
        setInterval(syncTasksLoop, 3000);
    </script>
</body>
</html>
